{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add Student{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="fc-header">
      <div class="fc-icon add-icon"><i class="bi bi-person-plus-fill"></i></div>
      <div>
        <h2>New Enrollment</h2>
        <p>Fill in the details to register a student</p>
      </div>
    </div>

    <form method="POST" action="{{ url_for('add_student') }}" novalidate id="studentForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="bi bi-person"></i>
            <input type="text" name="name" class="form-input" value="{{ name }}"
                   placeholder="e.g. Priya Sharma" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="bi bi-envelope"></i>
            <input type="email" name="email" class="form-input" value="{{ email }}"
                   placeholder="e.g. priya@example.com" required />
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Mobile Number <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="bi bi-phone"></i>
            <input type="tel" name="mobile" class="form-input" value="{{ mobile }}"
                   placeholder="e.g. 9876543210" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Course <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="bi bi-book"></i>
            <select name="course" class="form-input" required>
              <option value="" disabled {% if not course %}selected{% endif %}>Select a course</option>
              {% for c in courses %}
                <option value="{{ c }}" {% if course == c %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('students') }}" class="btn-back">
          <i class="bi bi-arrow-left"></i> Back
        </a>
        <button type="submit" class="btn-submit">
          <i class="bi bi-check-lg"></i> Add Student
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
