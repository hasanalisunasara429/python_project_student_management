{% extends 'base.html' %}
{% block title %}Edit Student{% endblock %}
{% block page_title %}Edit Student{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="fc-header">
      <div class="fc-icon edit-icon"><i class="bi bi-pencil-fill"></i></div>
      <div>
        <h2>Edit Student</h2>
        <p>Update details for <strong>{{ student.name }}</strong></p>
      </div>
    </div>

    <form method="POST" action="{{ url_for('edit_student', student_id=student.id) }}" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="bi bi-person"></i>
            <input type="text" name="name" class="form-input" value="{{ student.name }}" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="bi bi-envelope"></i>
            <input type="email" name="email" class="form-input" value="{{ student.email }}" required />
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Mobile Number <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="bi bi-phone"></i>
            <input type="tel" name="mobile" class="form-input" value="{{ student.mobile }}" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Course <span class="req">*</span></label>
          <div class="input-wrap">
            <i class="bi bi-book"></i>
            <select name="course" class="form-input" required>
              {% for c in courses %}
                <option value="{{ c }}" {% if student.course == c %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('students') }}" class="btn-back">
          <i class="bi bi-arrow-left"></i> Back
        </a>
        <button type="submit" class="btn-submit edit-submit">
          <i class="bi bi-check-lg"></i> Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
